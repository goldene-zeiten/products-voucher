services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  GoldeneZeiten\Products\Voucher\:
    resource: '../Classes/*'

  # Public so a functional test can fetch it directly; its only runtime consumer is the core order-detail
  # panel registry, whose tagged iterator would otherwise inline it into a non-fetchable service.
  GoldeneZeiten\Products\Voucher\Backend\OrderDetail\VoucherRedemptionPanel:
    public: true
